x-app: &app
  build:
    context: .
    target: staging
  env_file:
    - .env
  environment:
    SSL_MODE: off
    PHP_OPCACHE_ENABLE: 1
  extra_hosts:
    # So DB_HOST=host.docker.internal works against an external Postgres on the host.
    - "host.docker.internal:host-gateway"
  networks:
    - token-slayer
  restart: unless-stopped

services:
  php:
    <<: *app
    # Bound to loopback so only host cloudflared (or local debugging) can reach it.
    # Cloudflare Tunnel: app.<your-domain> (no path) -> http://localhost:${APP_PORT}
    ports:
      - '127.0.0.1:${APP_PORT:-8000}:8080'

  reverb:
    <<: *app
    # docker-compose.yml only mounts source for `php`; re-declare here for reverb.
    volumes:
      - .:/var/www/html/
    # Cloudflare Tunnel: app.<your-domain> Path=^/app/ -> http://localhost:${REVERB_HOST_PORT}
    # (Same hostname as the app; avoids two-level subdomain SSL issue.)
    # REVERB_HOST_PORT is the *host loopback* port cloudflared connects to;
    # REVERB_PORT is the container-internal port Laravel publishes to over
    # the Docker network (must match the --port flag on reverb:start).
    ports:
      - '127.0.0.1:${REVERB_HOST_PORT:-8080}:8080'
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

  scheduler:
    <<: *app
    # docker-compose.yml only mounts source for `php`; re-declare here so the
    # scheduler sees routes/console.php and the same app code as the web tier.
    volumes:
      - .:/var/www/html/
    # `schedule:work` is the long-running, container-friendly equivalent of a
    # host crontab calling `schedule:run` every minute — no port, no inbound
    # traffic, just an internal tick loop dispatching due commands.
    command: php artisan schedule:work

  redis:
    image: 'valkey/valkey:8-alpine'
    # No published port — reachable only over the token-slayer network as `redis`.
    volumes:
      - 'redis:/data'
    networks:
      - token-slayer
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s

  worker:
    <<: *app
    # docker-compose.yml only mounts source for `php`; re-declare here so the
    # worker runs the same app code as the web tier.
    volumes:
      - .:/var/www/html/
    depends_on:
      - redis
    # Long-running queue consumer for the redis connection. --max-time recycles
    # the process hourly so a leaked resource or stale code never lingers.
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

networks:
  token-slayer:

volumes:
  redis:
